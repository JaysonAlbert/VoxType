name: Build and Release

on:
  push:
    branches:
      - '0.*'
      - '0.1.*'
      - '1.*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Get current branch name
        id: branch-name
        run: echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Get version from package.json
        id: package-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
        shell: bash

      - name: Validate version from branch name
        run: |
          branch_version=${{ steps.branch-name.outputs.version }}
          pkg_version=${{ steps.package-version.outputs.version }}
          
          if [[ ! "$branch_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Branch name must be in semver format (e.g., 0.0.1, 1.2.3)"
            exit 1
          fi
          
          if [[ "$branch_version" != "$pkg_version" ]]; then
            echo "Error: Version mismatch between branch name '$branch_version' and package.json '$pkg_version'"
            exit 1
          fi
          
          echo "✓ Version validated: $pkg_version"

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy

      - name: Install Windows dependencies
        run: |
          choco install cmake -y --no-progress
          choco install visualstudio2022workload-vc-tools -y --no-progress

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: ${{ steps.package-version.outputs.version }}
          tagName: v${{ steps.package-version.outputs.version }}
          releaseTitle: 'VoxType v${{ steps.package-version.outputs.version }}'
          releaseBody: |
            ## VoxType v${{ steps.package-version.outputs.version }}
            
            - Native Whisper-rs integration
            - Improved speech recognition
            - Single executable installer
