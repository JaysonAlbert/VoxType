name: Build and Release

on:
  push:
    branches:
      - '0.*'
      - '0.1.*'
      - '1.*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Get current branch name
        id: branch-name
        run: echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Get version from package.json
        id: package-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
        shell: bash

      - name: Validate version from branch name
        run: |
          $branch_version="${{ steps.branch-name.outputs.version }}"
          $pkg_version="${{ steps.package-version.outputs.version }}"
          
          if ([regex]::IsMatch($branch_version, '^\d+\.\d+\.\d+$')) {
            Write-Host "✓ branch_version matched: $branch_version"
          } else {
            Write-Error "Branch name '$branch_version' is not in semver format (e.g., 0.0.1, 1.2.3)"
            exit 1
          }
          
          if ($branch_version -eq $pkg_version) {
            Write-Host "✓ Versions match: $pkg_version"
          } else {
            Write-Error "Version mismatch: branch '$branch_version' does not match package.json '$pkg_version'"
            exit 1
          }

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy

      - name: Install Windows dependencies
        run: |
          # CMake is pre-installed on windows-latest
          Write-Host "CMake version:" $(cmake --version)

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@dev
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tauriScript: npm run build && npm run tauri
          tagName: v${{ steps.package-version.outputs.version }}
          releaseName: VoxType v${{ steps.package-version.outputs.version }}
          releaseBody: |
            ## VoxType v${{ steps.package-version.outputs.version }}
            
            - Native Whisper-rs integration
            - Improved speech recognition
            - Single executable installer
          releaseDraft: false
          prerelease: false
